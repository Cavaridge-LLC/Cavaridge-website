<style>
/* ─── Reset & Tokens ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5E465C;--navy:#1B2A4A;--amber:#C4883A;--sage:#6B8F71;
  --warm-white:#F5F2ED;--charcoal:#2D2D2D;--white:#FFFFFF;
  --border:#E8E5E0;--mid-gray:#7A7A7A;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --max-w:1140px;--max-w-text:760px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--charcoal);background:var(--warm-white);-webkit-font-smoothing:antialiased;line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:rgba(196,136,58,.2)}

/* ─── Typography ─── */
h1,h2,h3{font-family:var(--font-display);font-weight:400;line-height:1.15}
h1{font-size:clamp(2.25rem,5vw,3.25rem);margin-bottom:1.25rem}
h2{font-size:clamp(1.75rem,3.5vw,2.25rem);margin-bottom:1rem}
h3{font-size:1.25rem;margin-bottom:.5rem}
p{margin-bottom:1rem}
p:last-child{margin-bottom:0}

/* ─── Layout ─── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 2rem}
.text-container{max-width:var(--max-w-text);margin:0 auto}
.text-center{text-align:center}
.section{padding:5rem 2rem}
.section-sm{padding:3.5rem 2rem}

/* ─── Buttons ─── */
.btn{display:inline-block;padding:14px 32px;border-radius:6px;font-family:var(--font-body);font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:all .2s ease;text-decoration:none}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-amber{background:var(--amber);color:var(--white)}
.btn-white{background:var(--white);color:var(--navy)}
.btn-sm{padding:8px 20px;font-size:.85rem}
.btn-block{width:100%}

/* ─── Header ─── */
.site-header{position:sticky;top:0;z-index:1000;background:var(--white);border-bottom:1px solid var(--border);transition:box-shadow .2s}
.site-header.scrolled{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:var(--max-w);margin:0 auto;padding:0 2rem}
.wordmark{font-family:var(--font-display);font-size:1.5rem;color:var(--purple);letter-spacing:.15em;cursor:pointer;text-decoration:none}
.wordmark-white{color:var(--white)}
.nav{display:flex;align-items:center;gap:2rem}
.nav-link{font-size:.9rem;font-weight:500;color:var(--charcoal);cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:border-color .2s}
.nav-link:hover,.nav-link.active{border-bottom-color:var(--amber)}
.nav-dropdown{position:relative}
.nav-dropdown-menu{position:absolute;top:calc(100% + 12px);left:-16px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 0;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.08);opacity:0;visibility:hidden;transform:translateY(-4px);transition:all .2s ease}
.nav-dropdown:hover .nav-dropdown-menu,.nav-dropdown-menu:hover{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-item{display:block;padding:10px 20px;font-size:.88rem;color:var(--charcoal);cursor:pointer;transition:background .15s}
.dropdown-item:hover{background:var(--warm-white)}
.dropdown-item.active{color:var(--amber)}
.mobile-toggle{display:none;align-items:center;gap:1rem}
.hamburger{background:none;border:none;cursor:pointer;padding:4px}
.mobile-menu{display:none;background:var(--white);border-top:1px solid var(--border);padding:1rem 2rem 1.5rem}
.mobile-menu.open{display:block}
.mobile-link{display:block;padding:12px 0;font-size:.95rem;font-weight:500;color:var(--charcoal);cursor:pointer;border-bottom:1px solid var(--border)}
.mobile-link.active{color:var(--amber)}
.chevron{transition:transform .2s;margin-left:4px}
@media(max-width:900px){
  .nav{display:none !important}
  .mobile-toggle{display:flex !important}
}

/* ─── Hero Variants ─── */
.hero{padding:6rem 2rem 5rem;text-align:center;position:relative;overflow:hidden}
.hero-purple{background:var(--purple);color:var(--white)}
.hero-purple p{color:rgba(255,255,255,.82)}
.hero-image{position:relative;min-height:480px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--white)}
.hero-image::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(94,70,92,.85) 0%,rgba(27,42,74,.8) 100%);z-index:1}
.hero-image .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-image .hero-content{position:relative;z-index:2;max-width:800px;padding:2rem}
.hero-image .hero-content p{color:rgba(255,255,255,.85)}

/* ─── Divisions Grid ─── */
.divisions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2rem}
.division-card{background:var(--white);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:all .25s ease}
.division-card:hover{border-color:var(--amber);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.division-card-img{height:180px;overflow:hidden;position:relative}
.division-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.division-card:hover .division-card-img img{transform:scale(1.05)}
.division-card-body{padding:1.75rem}
.division-card-body h3{color:var(--purple)}
.division-card-body p{font-size:.9rem;color:var(--charcoal);margin-bottom:.75rem}
.card-link{font-size:.85rem;color:var(--amber);font-weight:600}

/* ─── Service Blocks ─── */
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2.5rem;margin-top:2.5rem}
.service-block{padding:2rem;background:var(--white);border-radius:10px;border:1px solid var(--border)}
.service-block h3{color:var(--purple)}
.service-block p{font-size:.9rem}
.service-icon{width:48px;height:48px;border-radius:10px;background:rgba(94,70,92,.08);display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.service-icon svg{width:24px;height:24px;stroke:var(--purple);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ─── Beliefs Grid ─── */
.beliefs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2.5rem;margin-top:2.5rem}
.belief-card{text-align:left}
.belief-bar{width:40px;height:3px;background:var(--purple);border-radius:2px;margin-bottom:1rem}
.belief-card h3{color:var(--purple)}
.belief-card p{font-size:.9rem}

/* ─── Split Section ─── */
.split{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch}
.split-text{padding:4rem 3rem;display:flex;flex-direction:column;justify-content:center}
.split-image{position:relative;min-height:400px;overflow:hidden}
.split-image img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
@media(max-width:768px){
  .split{grid-template-columns:1fr}
  .split-image{min-height:280px}
  .split-text{padding:3rem 2rem}
}

/* ─── Photo Band ─── */
.photo-band{height:320px;position:relative;overflow:hidden}
.photo-band img{width:100%;height:100%;object-fit:cover}
.photo-band::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(27,42,74,.3) 100%)}

/* ─── Navy Section ─── */
.navy-section{background:var(--navy);color:var(--white);text-align:center}
.navy-section p{color:rgba(255,255,255,.8)}
.navy-section h2{color:var(--white)}
.navy-section .overline{color:rgba(255,255,255,.45)}

/* ─── Legacy Section (from production site) ─── */
.legacy-section{background:var(--white);text-align:center}
.legacy-section .overline{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);margin-bottom:.75rem}

/* ─── Form ─── */
.form-group{margin-bottom:1.25rem}
.form-label{display:block;font-size:.85rem;font-weight:600;color:var(--charcoal);margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:6px;font-family:var(--font-body);font-size:.9rem;color:var(--charcoal);background:var(--white);outline:none;transition:border-color .2s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--amber)}
.form-textarea{min-height:120px;resize:vertical}

/* ─── Footer ─── */
.site-footer{background:var(--navy);padding:3.5rem 2rem 1.5rem}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2.5rem;margin-bottom:2.5rem}
.footer-label{font-size:.75rem;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.footer-link{display:block;font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:6px;cursor:pointer;transition:color .15s}
.footer-link:hover{color:var(--white)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.12);padding-top:1.25rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:.5rem}
.footer-bottom span{font-size:.75rem;color:rgba(255,255,255,.4)}

/* ─── Utility ─── */
.overline{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mid-gray);margin-bottom:.75rem}
.dedication{font-style:italic;font-size:.75rem;color:var(--mid-gray);text-align:center;padding:1rem 0 3rem}
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0}
.hidden{display:none}

/* ─── Page transitions ─── */
.page{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

let currentPage = 'home';

function navigate(slug) {
  currentPage = slug;
  window.location.hash = slug === 'home' ? '' : slug;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  closeMobile();
}

function toggleMobile() {
  const menu = document.getElementById('mobile-menu');
  menu.classList.toggle('open');
}
function closeMobile() {
  document.getElementById('mobile-menu').classList.remove('open');
}

// ─── Template Helpers ───
function heroImage(slug, title, subtitle, ctaText, ctaSlug) {
  return `
    <section class="hero hero-image">
      <img class="hero-bg" src="${HERO_IMAGES[slug]}" alt="${title}" loading="lazy">
      <div class="hero-content">
        <h1>${title}</h1>
        <p>${subtitle}</p>
        ${ctaText ? `<div style="margin-top:2rem"><a class="btn btn-amber" onclick="navigate('${ctaSlug||'contact'}')">${ctaText}</a></div>` : ''}
      </div>
    </section>`;
}

function serviceCard(ic, title, desc) {
  return `<div class="service-block">${icon(ic)}<h3>${title}</h3><p>${desc}</p></div>`;
}

function bottomCTA(headline, body, btnText, btnSlug) {
  return `
    <section class="section navy-section">
      <div class="container text-center">
        <h2>${headline||'Ready to talk?'}</h2>
        ${body ? `<p style="max-width:600px;margin:0 auto 2rem">${body}</p>` : '<div style="height:1rem"></div>'}
        <a class="btn btn-amber" onclick="navigate('${btnSlug||'contact'}')">${btnText||'Get in Touch'}</a>
      </div>
    </section>`;
}

function photoBand(slug) {
  return `<div class="photo-band"><img src="${BODY_IMAGES[slug]}" alt="" loading="lazy"></div>`;
}

const ROUTES = {
  home: pageHome, about: pageAbout, consulting: pageConsulting,
  'managed-services': pageManagedServices, apps: pageApps, health: pageHealth,
  puppies: pagePuppies, farms: pageFarms, rentals: pageRentals,
  properties: pageProperties, ranch: pageRanch, contact: pageContact,
  'privacy-policy': pagePrivacyPolicy, terms: pageTerms
};

function render() {
  const page = ROUTES[currentPage] || pageHome;
  document.getElementById('app').innerHTML = `<div class="page">${page()}</div>`;
  updateNav();
}

function updateNav() {
  document.querySelectorAll('.nav-link[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === currentPage);
  });
}

// ─── Init ───
function init() {
  // Build dropdown
  const dd = document.getElementById('divisions-dropdown');
  dd.innerHTML = DIVISIONS.map(d =>
    `<span class="dropdown-item" data-slug="${d.slug}" onclick="navigate('${d.slug}')">${d.name}</span>`
  ).join('');

  // Build mobile menu
  const mm = document.getElementById('mobile-menu');
  const allLinks = [{name:'Home',slug:'home'},{name:'About',slug:'about'},...DIVISIONS,{name:'Contact',slug:'contact'}];
  mm.innerHTML = allLinks.map(l => `<div class="mobile-link" data-slug="${l.slug}" onclick="navigate('${l.slug}')">${l.name}</div>`).join('');

  // Scroll listener
  window.addEventListener('scroll', () => {
    document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
  });

  // Hash routing
  const hash = window.location.hash.replace('#','');
  if (hash && ROUTES[hash]) currentPage = hash;
  window.addEventListener('hashchange', () => {
    const h = window.location.hash.replace('#','');
    if (h && ROUTES[h]) { currentPage = h; render(); }
    else if (!h) { currentPage = 'home'; render(); }
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
