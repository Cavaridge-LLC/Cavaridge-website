<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavaridge — Platform Status</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='3' fill='%231B2A4A'/><path d='M4 16L8 8L12 12L16 6L20 16' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F5F2ED; }
    #user-bar {
      background: #5E465C; padding: 6px 28px; display: flex; align-items: center; justify-content: flex-end; gap: 12px;
    }
    #user-bar img { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); }
    #user-bar span { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500; }
    #user-bar a { font-size: 10px; color: rgba(255,255,255,0.5); text-decoration: none; font-weight: 600; letter-spacing: 0.04em; }
    #user-bar a:hover { color: #fff; }
  </style>
</head>
<body>

<!-- User bar (populated by JS) -->
<div id="user-bar">
  <span id="user-name">Loading...</span>
  <a href="/auth/logout">Sign Out</a>
</div>

<!-- React app mount -->
<div id="root"></div>

<!-- Load user info -->
<script>
  fetch("/auth/me", { credentials: "same-origin" })
    .then(r => r.json())
    .then(user => {
      const bar = document.getElementById("user-bar");
      const name = document.getElementById("user-name");
      if (user.photo) {
        const img = document.createElement("img");
        img.src = user.photo;
        img.alt = user.name;
        bar.insertBefore(img, name);
      }
      name.textContent = user.email;
    })
    .catch(() => {
      window.location.href = "/login";
    });
</script>

<!-- Status page component -->
<script type="text/babel" data-type="module" src="/app-component.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(StatusApp));
</script>

</body>
</html>
